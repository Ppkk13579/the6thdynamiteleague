    <nav>

<main class="standings-page">

    <div class="container standings-container">

        <div class="league-container">

            <section>

                <h2>シティーリーグ順位表</h2>

                <div class="table-wrapper">

                <table class="standings-table">

                    <thead>
                        <tr>
                            <th>順位</th>
                            <th>チーム</th>
                            <th>試合</th>
                            <th>勝</th>
                            <th>敗</th>
                            <th>分</th>
                            <th>勝率</th>
                            <th>勝差</th>                            
                            <th>得点</th>
                            <th>失点</th>
                            <th>得失点</th>
                            <th>本塁打</th>
                            <th>盗塁</th>
                        </tr>
                    </thead>

                    <tbody id="Cityleague-detail"></tbody>

                </table>

                </div>

                <h2>シティーリーグ 対戦表</h2>
                <div id="Cityleague-matchup"></div>


            </section>

            <section>

                <h2>ワイルドリーグ順位表</h2>

                <div class="table-wrapper">

                <table class="standings-table">

                    <thead>
                        <tr>
                            <th>順位</th>
                            <th>チーム</th>
                            <th>試合</th>
                            <th>勝</th>
                            <th>敗</th>
                            <th>分</th>
                            <th>勝率</th>
                            <th>勝差</th>
                            <th>得点</th>
                            <th>失点</th>
                            <th>得失点</th>
                            <th>本塁打</th>
                            <th>盗塁</th>
                        </tr>
                    </thead>

                    <tbody id="Wildleague-detail"></tbody>

                </table>

                </div>

                <h2>ワイルドリーグ 対戦表</h2>
                <div id="Wildleague-matchup"></div>

            </section>

        </div>
        
        <section>
        <h2>交流戦順位表</h2>

        <div class="table-wrapper">

        <table class="standings-table">

        <thead>
        <tr>
            <th>順位</th>
            <th>チーム</th>
            <th>試合</th>
            <th>勝</th>
            <th>敗</th>
            <th>分</th>
            <th>勝率</th>
            <th>勝差</th>
        </tr>
        </thead>

        </div>
        <h2>交流戦対戦表</h2>

        <div class="interleague-wrapper">
            <div id="interleague-matchup"></div>
        </div>
        </section>
    
        <section>
        <h2>オープン戦順位表</h2>

        <div class="table-wrapper">

        <table class="standings-table">

        <thead>
        <tr>
            <th>順位</th>
            <th>チーム</th>

            <th>勝</th>

            <th>勝率</th>
            <th>勝差</th>

        </div>

        </section>
